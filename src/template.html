<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather!</title>
        <!-- <link rel="stylesheet" href="styles.css"> -->
        <link rel="shortcut icon" href="#" />
        <!-- No icon -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
        <link
            href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            Weather App
        </header>
        <main>
            <form id="searchForm" novalidate>
                <input id="searchInput" type="text" placeholder="Enter city name">
                <button id=searchBtn type="submit">Search</button>
            </form>
            <div id="searchResults">
                <h3 id="location">Halifax</h3>
                <div id="currentWeather">
                    <div id="conditions">Partially cloudy</div>
                    <div id="currentTemp">5°C</div>
                    <div id="iconContainer">
                        <i id="weatherIcon" class="wi wi-day-sunny"></i>
                    </div>
                <div id="feelslike">Feels like: 1°C</div>
                <div id="humidity">Humidity: 80%</div>
                <div id="wind">Wind: 6.71 km/h</div>

            </div>
        </main>
        <footer>
            <a href="https://github.com/stevec-afk" target="_blank">Steve C</a>
            <span class="separator">|</span>
            <a href="https://github.com/stevec-afk/weather-app" target="_blank">Source</a>
        </footer>
    </body>
</html>
