<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather!</title>
        <!-- <link rel="stylesheet" href="styles.css"> -->
        <link rel="shortcut icon" href="#" />
        <!-- No icon -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
        <link
            href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&amp;family=Sacramento&amp;display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            Weather!
        </header>
        <main>
            <form id="search-form" novalidate>
                <input id="search-input" type="text" placeholder="Enter city name">
                <button id=search-btn type="submit">Search</button>
            </form>
            <div id="main-content">
                <div id="card-header">
                    <span id="location">Halifax</span>
                    <span id="timestamp">12:00pm</span>
                </div>
                <div id="card-left">
                    <i id="weather-icon" class="wi wi-day-sunny"></i>
                    <div id="current-temp">5°C</div>
                </div>
                <div id="card-right">
                    <div class="weather-detail">
                        <span>Conditions</span>
                        <span id="conditions">Partially cloudy
                    </div>
                    <div class="weather-detail">
                        <span>Feels like</span>
                        <span id="feelslike">1 °C</span>
                    </div>
                    <div class="weather-detail">
                        <span>Humidity</span>
                        <span id="humidity">80%</span>
                    </div>
                    <div class="weather-detail">
                        <span>Wind Gusts</span>
                        <span id="wind">6.71 km/h</span>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <a href="https://github.com/stevec-afk" target="_blank">Steve C</a>
            <span class="separator">|</span>
            <a href="https://github.com/stevec-afk/weather-app" target="_blank">Source</a>
        </footer>
    </body>
</html>
